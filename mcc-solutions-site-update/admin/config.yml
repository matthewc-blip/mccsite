backend:
  name: github
  repo: matthewc-blip/mccsite
  branch: main
  base_url: https://mcc-cms-auth.YOUR_SUBDOMAIN.workers.dev
  auth_endpoint: auth

publish_mode: simple
media_folder: "blog/images"
public_folder: "/blog/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly, e.g. my-post-title (no spaces)" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Building MCC Solutions"
          - "Notary & Real Estate"
          - "Bookkeeping"
          - "Web Design"
          - "EA Journey"
          - "Personal Finance"
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentence summary shown on the blog list page" }
      - { label: "Body", name: "body", widget: "markdown" }
